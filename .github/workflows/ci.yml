name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test

    - name: Run Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
      docker build \
      -t ${{ secrets.DOCKER_USERNAME }}/nodejs-cicd-app:latest \
      -t ${{ secrets.DOCKER_USERNAME }}/nodejs-cicd-app:${{ github.sha }} .

    - name: Scan Docker Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/nodejs-cicd-app:latest'
        format: 'table'

    - name: Push Docker Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/nodejs-cicd-app:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/nodejs-cicd-app:${{ github.sha }}
